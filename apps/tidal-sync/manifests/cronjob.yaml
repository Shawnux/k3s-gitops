apiVersion: batch/v1
kind: CronJob
metadata:
  name: tidal-sync
  namespace: default 
spec:
  schedule: "0 0 * * *" # Runs at 00:00 every day
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: tidal-sync
            image: ghcr.io/shawnux/tidal-sync:latest
            imagePullPolicy: Always
            volumeMounts:
            - name: auth-vol
              mountPath: "/app/secrets"
              readOnly: true
          volumes:
          - name: auth-vol
            secret:
              secretName: tidal-session-secret
          restartPolicy: OnFailure